<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <title>The Bricks</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="icon" type="image/x-icon" href="img/favicon.png">
  <script src="js/jQuery.js"></script>
  <script src="js/script.js"></script>
</head>
<body onload="init()">
  <div class="container">
    <div class="game-header">
      <h1 class="naslov">The Bricks</h1>
      <p class="navodila">Premikaj ploscico z levo in desno puscico in pocisti vse bloke.</p>
    </div>
    <div class="hud">
      <div class="kocke">
        <span class="hud-label">Level</span>
        <label id="level">1</label>
      </div>
      <div class="kocke">
        <span class="hud-label">Cas</span>
        <label id="cas">00:00</label>
      </div>
      <div class="kocke">
        <span class="hud-label">Tocke</span>
        <label id="tocke">0</label>
      </div>
    </div>
    <div class="controls">
      <button id="start-btn" type="button" onclick="startGame()">Start</button>
      <button id="pause-btn" type="button" onclick="togglePause()">Pavza</button>
    </div>
    <div class="canvas-frame">
      <canvas id="canvas" width="710" height="520"></canvas>
    </div>
  </div>
</body>
</html>
