<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <title>The Bricks</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="icon" type="image/x-icon" href="img/favicon.png">
  <script src="js/jQuery.js"></script>
  <script src="js/script.js"></script>
</head>
<body onload="init()">
  <div class="container">
    <div class="game-header">
      <h1 class="naslov">The Bricks</h1>
      <p class="navodila">Premikaj ploščico z levo in desno puščico in počisti vse bloke.</p>
    </div>
    <div class="hud">
      <div class="kocke">
        <span class="hud-label">Točke</span>
        <label id="tocke">0</label>
      </div>
    <div class="kocke" id="cas-box">
      <span class="hud-label">Cas</span>
      <mark id="cas">00:00</mark>
    </div>

      <div class="kocke">
        <span class="hud-label">Level</span>
        <label id="level">1</label>
      </div>
    </div>

    <div class="canvas-frame">
      <canvas id="canvas" width="710" height="520"></canvas>
    </div>
    <div class="gumbi">
      <button id="start-btn" type="button" onclick="startGame()">Začetek</button>
      <button id="pause-btn" type="button" onclick="togglePause()">Pavza</button>
      <button id="reset-btn" type="button" onclick="resetGame()">Reset</button>
      <button id="reset-btn" type="button" onclick="navodila()">Navodila</button>
      <button id="reset-btn" type="button" onclick="lestvica()">🏆 Lestvica</button>
      <button id="reset-btn" type="button" onclick="pocistiLestvico()">Ponastavi Lestvico</button>
    </div>
  </div>
</body>
</html>
